<!DOCTYPE html>
<html>
<head>
  <title>Save Tabs and Read JSON</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    #fileInput {
      display: none; /* Hide the actual file input */
    }
    #browseButton {
      padding: 10px 20px;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
      border-radius: 4px;
      margin-top: 10px;
    }
    #browseButton:hover {
      background-color: #0056b3;
    }
    pre {
      background: #f0f0f0;
      padding: 10px;
      white-space: pre-wrap;
      word-wrap: break-word;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <h1>Save Open Tabs</h1>
  <button id="saveTabsButton">Save Tabs as JSON</button>
  <button id="viewBookmarksButton">View Saved Bookmarks</button>
  
  <h2>Read JSON File</h2>
  <button id="browseButton">Browse JSON File</button>
  <input type="file" id="fileInput" accept=".json">
  <pre id="jsonOutput"></pre>

  <script src="popup.js"></script>
</body>
</html>
